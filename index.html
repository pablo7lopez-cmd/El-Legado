<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>El Legado — Calendario de Reservas</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#f5f0e8; --paper:#fdfaf4; --ink:#1a1410; --ink-light:#6b5d4f; --border:#d4c9b5;
    --f1:#c0392b; --f1-light:#fadbd8;
    --f2:#1a6b8a; --f2-light:#d6eaf8;
    --f3:#7d6608; --f3-light:#fef9e7;
    --f4:#1e8449; --f4-light:#d5f5e3;
    --libre:#7f8c8d; --libre-light:#f0f3f3;
    --comp:#6c3483; --comp-light:#f4ecf7;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{min-height:100%;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);display:flex;flex-direction:column;}
  header{background:var(--ink);color:var(--bg);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;flex-shrink:0;}
  .logo h1{font-family:'Playfair Display',serif;font-size:20px;font-weight:900;}
  .logo p{font-size:9px;text-transform:uppercase;letter-spacing:3px;opacity:.5;margin-top:2px;}
  .legend{display:flex;gap:12px;flex-wrap:wrap;align-items:center;}
  .li{display:flex;align-items:center;gap:4px;font-size:10px;font-weight:500;}
  .ld{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
  .sync-dot{width:8px;height:8px;border-radius:50%;background:#f39c12;flex-shrink:0;transition:background .4s;}
  .sync-dot.ok{background:#27ae60;} .sync-dot.err{background:#e74c3c;}
  .sync-dot.loading{background:#f39c12;animation:pulse 1s infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  .sync-label{font-size:9px;opacity:.6;letter-spacing:.5px;}
  .top-bar{background:var(--paper);border-bottom:1px solid var(--border);padding:7px 24px;display:flex;align-items:center;gap:10px;flex-shrink:0;flex-wrap:nowrap;overflow-x:auto;}
  .top-bar label{font-size:11px;font-weight:600;color:var(--ink-light);text-transform:uppercase;letter-spacing:1px;white-space:nowrap;}
  .fbts{display:flex;gap:5px;flex-wrap:wrap;}
  .fbt{padding:4px 12px;border-radius:16px;border:2px solid;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;cursor:pointer;transition:all .2s;}
  .fbt[data-fam="1"]{border-color:var(--f1);background:var(--f1);color:#fff;}
  .fbt[data-fam="1"].active{background:var(--f1);color:#fff;box-shadow:0 0 0 3px rgba(192,57,43,.35);}
  .fbt[data-fam="2"]{border-color:var(--f2);background:var(--f2);color:#fff;}
  .fbt[data-fam="2"].active{background:var(--f2);color:#fff;box-shadow:0 0 0 3px rgba(26,107,138,.35);}
  .fbt[data-fam="3"]{border-color:var(--f3);background:var(--f3);color:#fff;}
  .fbt[data-fam="3"].active{background:var(--f3);color:#fff;box-shadow:0 0 0 3px rgba(125,102,8,.35);}
  .fbt[data-fam="4"]{border-color:var(--f4);background:var(--f4);color:#fff;}
  .fbt[data-fam="4"].active{background:var(--f4);color:#fff;box-shadow:0 0 0 3px rgba(30,132,73,.35);}
  #vl{margin-left:auto;font-size:10px;color:var(--ink-light);font-style:italic;}
  main{flex:1;padding:20px 18px 50px;}
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px;background:var(--paper);border:1px solid var(--border);border-radius:10px;padding:14px;}
  .si{text-align:center;}
  .sn{font-family:'Playfair Display',serif;font-size:26px;font-weight:900;line-height:1;}
  .sl{font-size:9px;color:var(--ink-light);margin-top:3px;text-transform:uppercase;letter-spacing:.8px;}
  .si[data-fam="1"] .sn{color:var(--f1);} .si[data-fam="2"] .sn{color:var(--f2);}
  .si[data-fam="3"] .sn{color:var(--f3);} .si[data-fam="4"] .sn{color:var(--f4);}
  .mgrid{display:block;width:100%;}
  .mrow{display:flex;gap:16px;margin-bottom:16px;width:100%;}
  .mrow .mc{flex:1;min-width:0;}
  .mc{background:var(--paper);border:1px solid var(--border);border-radius:10px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.04);}
  .mh{padding:9px 14px;background:var(--ink);color:var(--bg);display:flex;justify-content:space-between;align-items:center;}
  .mn{font-family:'Playfair Display',serif;font-size:15px;font-weight:700;}
  .my{font-size:10px;opacity:.45;letter-spacing:1px;}
  .cg{padding:10px;}
  .cdh{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;margin-bottom:3px;}
  .cdl{text-align:center;font-size:8px;font-weight:600;text-transform:uppercase;color:var(--ink-light);padding:2px 0;}
  .cdl.wk{color:var(--ink);font-weight:700;}
  .cc-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;}
  .cc{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:4px;font-size:11px;font-weight:500;cursor:default;transition:all .15s;min-height:28px;}
  .cc.wd{color:var(--ink-light);}
  .cc.we{font-weight:700;cursor:pointer;}
  .cc.s-reservado{border-radius:0;} .cc.r-start{border-radius:5px 0 0 5px;} .cc.r-end{border-radius:0 5px 5px 0;} .cc.r-solo{border-radius:5px;}
  .cc[data-fam="1"].s-reservado{background:var(--f1-light);color:var(--f1);}
  .cc[data-fam="2"].s-reservado{background:var(--f2-light);color:var(--f2);}
  .cc[data-fam="3"].s-reservado{background:var(--f3-light);color:var(--f3);}
  .cc[data-fam="4"].s-reservado{background:var(--f4-light);color:var(--f4);}
  .cc.s-libre.we{background:var(--libre-light);color:var(--libre);}
  .cc.s-liberado{background:var(--libre-light);color:var(--libre);}
  .cc.s-tomado{border-radius:0;}
  .cc[data-fam="1"].s-tomado{background:var(--f1-light);color:var(--f1);}
  .cc[data-fam="2"].s-tomado{background:var(--f2-light);color:var(--f2);}
  .cc[data-fam="3"].s-tomado{background:var(--f3-light);color:var(--f3);}
  .cc[data-fam="4"].s-tomado{background:var(--f4-light);color:var(--f4);}
  .cc.s-compartido{background:var(--comp-light);color:var(--comp);font-size:9px;}
  .cc.we:hover{filter:brightness(.92);transform:scale(1.06);z-index:2;}
  .snote{background:var(--comp-light);border:1px dashed var(--comp);border-radius:5px;padding:6px 10px;margin:0 10px 8px;font-size:9px;color:var(--comp);font-weight:600;text-align:center;}
  .wp{border-top:1px solid var(--border);padding:8px 10px;}
  .wr{display:flex;align-items:center;justify-content:space-between;padding:5px 7px;border-radius:6px;margin-bottom:4px;gap:5px;}
  .wr:last-child{margin-bottom:0;}
  .wr[data-fam="1"]{background:var(--f1-light);} .wr[data-fam="2"]{background:var(--f2-light);}
  .wr[data-fam="3"]{background:var(--f3-light);} .wr[data-fam="4"]{background:var(--f4-light);}
  .wr.libre{background:var(--libre-light);} .wr.comp{background:var(--comp-light);}
  .wi{display:flex;flex-direction:column;gap:1px;flex:1;}
  .wd2{font-size:10px;font-weight:700;} .wf{font-size:9px;opacity:.7;}
  .wtag{font-size:8px;font-weight:700;text-transform:uppercase;padding:2px 6px;border-radius:7px;color:#fff;white-space:nowrap;}
  .t-f1{background:var(--f1);} .t-f2{background:var(--f2);} .t-f3{background:var(--f3);} .t-f4{background:var(--f4);}
  .t-libre{background:var(--libre);} .t-comp{background:var(--comp);} .t-lib{background:#7f8c8d;}
  .ba{font-size:8px;font-weight:700;text-transform:uppercase;padding:2px 7px;border-radius:4px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap;}
  .b-lib{background:#ecf0f1;color:#7f8c8d;} .b-rec{background:var(--f1);color:#fff;}
  .b-tom{background:var(--libre);color:#fff;}
  .b-voy{background:var(--comp);color:#fff;}
  .b-nov{background:#ecf0f1;color:#7f8c8d;}
  .going-dots{display:inline-flex;gap:4px;margin-left:8px;vertical-align:middle;}
  .fdot{display:inline-block;width:10px;height:10px;border-radius:50%;}
  .mo{display:none;position:fixed;inset:0;background:rgba(26,20,16,.6);z-index:1000;align-items:center;justify-content:center;padding:20px;}
  .mo.active{display:flex;}
  .mb{background:var(--paper);border-radius:12px;padding:24px;max-width:400px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.3);}
  .mb h3{font-family:'Playfair Display',serif;font-size:17px;font-weight:700;margin-bottom:6px;}
  .mb p{font-size:12px;color:var(--ink-light);margin-bottom:14px;line-height:1.55;}
  .mbd{background:var(--bg);border-radius:6px;padding:9px 12px;font-size:12px;font-weight:600;margin-bottom:14px;border:1px solid var(--border);}
  .mac{display:flex;gap:8px;justify-content:flex-end;}
  .bc{padding:8px 16px;border:1px solid var(--border);border-radius:6px;background:transparent;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;color:var(--ink-light);}
  .bco{padding:8px 16px;border:none;border-radius:6px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:700;color:#fff;}
  .bco.liberar{background:#7f8c8d;} .bco.recuperar{background:var(--f1);}
  .toast{position:fixed;bottom:20px;right:20px;background:var(--ink);color:#fff;padding:10px 16px;border-radius:8px;font-size:12px;z-index:2000;transform:translateY(60px);opacity:0;transition:all .3s;box-shadow:0 6px 24px rgba(0,0,0,.25);}
  .toast.v{transform:none;opacity:1;}
  /* Highlight mode - dim other families when hovering a family button */
  .highlight-f1 .mc .wr[data-fam="2"],
  .highlight-f1 .mc .wr[data-fam="3"],
  .highlight-f1 .mc .wr[data-fam="4"],
  .highlight-f1 .cc[data-fam="2"],
  .highlight-f1 .cc[data-fam="3"],
  .highlight-f1 .cc[data-fam="4"] { opacity:.15; }

  .highlight-f2 .mc .wr[data-fam="1"],
  .highlight-f2 .mc .wr[data-fam="3"],
  .highlight-f2 .mc .wr[data-fam="4"],
  .highlight-f2 .cc[data-fam="1"],
  .highlight-f2 .cc[data-fam="3"],
  .highlight-f2 .cc[data-fam="4"] { opacity:.15; }

  .highlight-f3 .mc .wr[data-fam="1"],
  .highlight-f3 .mc .wr[data-fam="2"],
  .highlight-f3 .mc .wr[data-fam="4"],
  .highlight-f3 .cc[data-fam="1"],
  .highlight-f3 .cc[data-fam="2"],
  .highlight-f3 .cc[data-fam="4"] { opacity:.15; }

  .highlight-f4 .mc .wr[data-fam="1"],
  .highlight-f4 .mc .wr[data-fam="2"],
  .highlight-f4 .mc .wr[data-fam="3"],
  .highlight-f4 .cc[data-fam="1"],
  .highlight-f4 .cc[data-fam="2"],
  .highlight-f4 .cc[data-fam="3"] { opacity:.15; }

  .highlight-f1 .cc[data-fam="1"],
  .highlight-f2 .cc[data-fam="2"],
  .highlight-f3 .cc[data-fam="3"],
  .highlight-f4 .cc[data-fam="4"] { transform:scale(1.12); z-index:3; filter:brightness(.9); }

  .wr { transition: opacity .2s; }
  .cc { transition: opacity .2s, transform .15s; }
  @media(max-width:560px){
    main{padding:14px 10px 40px;} .stats{grid-template-columns:repeat(2,1fr);} .mrow{flex-direction:column;} .legend{display:none;}
  }
</style>
</head>
<body>
<header>
  <div class="logo"><h1>El Legado</h1><p>Sistema de Reservas · 4 Familias</p></div>
  <div class="legend">
    <div class="li"><div class="ld" style="background:var(--f1)"></div>Fede y Lala</div>
    <div class="li"><div class="ld" style="background:var(--f2)"></div>Pablo y Lore</div>
    <div class="li"><div class="ld" style="background:var(--f3)"></div>Javier y Vero</div>
    <div class="li"><div class="ld" style="background:var(--f4)"></div>Gaston y Vicky</div>
    <div class="li"><div class="ld" style="background:var(--libre)"></div>Libre</div>
    <div class="li"><div class="ld" style="background:var(--comp)"></div>Compartido</div>
    <div class="li"><div class="sync-dot loading" id="sync-dot"></div><span class="sync-label" id="sync-label">Conectando...</span></div>
  </div>
</header>
<div class="top-bar">
  <label>Soy:</label>
  <div class="fbts">
    <button class="fbt active" data-fam="1">Fede y Lala</button>
    <button class="fbt" data-fam="2">Pablo y Lore</button>
    <button class="fbt" data-fam="3">Javier y Vero</button>
    <button class="fbt" data-fam="4">Gaston y Vicky</button>
  </div>
  <span id="vl">Familia 1 · podés liberar tus fines de semana</span>
</div>
<main>
  <div id="sb" class="stats"></div>
  <div id="mg" class="mgrid"></div>
</main>
<div class="mo" id="mo">
  <div class="mb">
    <h3 id="mt">Liberar fin de semana</h3>
    <p id="mp">Si liberás este fin de semana, quedará disponible para coordinación.</p>
    <div class="mbd" id="md"></div>
    <div class="mac">
      <button class="bc" onclick="closeM()">Cancelar</button>
      <button class="bco" id="bca" onclick="confirmA()">Confirmar</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
var DB = 'https://el-legado-625de-default-rtdb.firebaseio.com';
var FAM = {1:{n:'Fede y Lala',t:'t-f1'},2:{n:'Pablo y Lore',t:'t-f2'},3:{n:'Javier y Vero',t:'t-f3'},4:{n:'Gaston y Vicky',t:'t-f4'}};
var MN = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
var cur = 1, pend = null, OV = {};

function setSyncStatus(s) {
  document.getElementById('sync-dot').className = 'sync-dot ' + s;
  document.getElementById('sync-label').textContent = s==='ok'?'Sincronizado':s==='err'?'Sin conexión':'Conectando...';
}

function fbFetch() {
  fetch(DB + '/overrides.json')
    .then(function(r){return r.json();})
    .then(function(data){
      OV = data || {};
      setSyncStatus('ok');
      render();
    })
    .catch(function(){
      setSyncStatus('err');
    });
}

function fbSet(key, val) {
  return fetch(DB + '/overrides/' + key + '.json', {method:'PUT', body:JSON.stringify(val)});
}

function fbDel(key) {
  return fetch(DB + '/overrides/' + key + '.json', {method:'DELETE'});
}

// Poll Firebase every 10 seconds for real-time updates
function startPolling() {
  fbFetch();
  setInterval(fbFetch, 10000);
}

function getMonths() {
  var out=[], y=2026, m=6;
  for(var i=0;i<12;i++){out.push({y:y,m:m});m++;if(m>11){m=0;y++;}}
  return out;
}

function dim(y,m){return new Date(y,m+1,0).getDate();}
function fdm(y,m){return new Date(y,m,1).getDay();}
function fmt(d){if(!d)return'';return d.getDate()+' '+['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'][d.getMonth()];}

function getWEs(y,m){
  var n=dim(y,m),wes=[];
  for(var d=1;d<=n;d++){
    if(new Date(y,m,d).getDay()===6){
      var s2=new Date(y,m,d+1);
      wes.push({sat:new Date(y,m,d),sun:s2.getMonth()===m?s2:null,sd:d,su:s2.getMonth()===m?d+1:null});
    }
  }
  return wes.map(function(w,idx){return {sat:w.sat,sun:w.sun,sd:w.sd,su:w.su,n:idx+1,tot:wes.length};});
}

function isShared(date){
  var y=date.getFullYear(),m=date.getMonth(),d=date.getDate();
  // Vacaciones invierno: 27 jun - 12 jul 2026
  if(y===2026&&m===5&&d>=27)return 'Vacaciones Invierno';
  if(y===2026&&m===6&&d<=12)return 'Vacaciones Invierno';
  // Vacaciones primavera: 19 - 27 sep 2026
  if(y===2026&&m===8&&d>=19&&d<=27)return 'Vacaciones Primavera';
  // Fin de año: 23 dic 2026 - 7 ene 2027
  if(y===2026&&m===11&&d>=23)return 'Fin de Año';
  if(y===2027&&m===0&&d<=7)return 'Año Nuevo';
  // Semana Santa 2027: 28 mar - 4 abr
  if(y===2027&&m===2&&d>=28)return 'Semana Santa';
  if(y===2027&&m===3&&d<=4)return 'Semana Santa';
  return null;
}

function weShared(we){return isShared(we.sat)||(we.sun?isShared(we.sun):null);}
function wKey(we){return we.sat.getFullYear()+'_'+we.sat.getMonth()+'_'+we.sd;}

function assign(we){if(we.tot===5&&we.n===5)return null;return we.n<=4?we.n:null;}

function wState(we){
  var sh=weShared(we);
  if(sh)return{tp:'compartido',lb:sh,fam:null};
  var f=assign(we);
  if(!f) return wStateFree(we);
  var ov=OV[wKey(we)];
  if(ov==='liberado')return{tp:'liberado',lb:'Liberado por '+FAM[f].n,fam:f,owner:f};
  if(ov&&ov.indexOf('tomado_')===0){
    var takenBy=parseInt(ov.split('_')[1]);
    return{tp:'tomado',lb:'Tomado por '+FAM[takenBy].n,fam:takenBy,owner:f};
  }
  return{tp:'reservado',lb:FAM[f].n,fam:f,owner:f};
}

function wStateFree(we){
  // For libre (5th) weekends that may have been taken
  var ov=OV[wKey(we)];
  if(ov&&ov.indexOf('tomado_')===0){
    var takenBy=parseInt(ov.split('_')[1]);
    return{tp:'tomado',lb:'Reservado por '+FAM[takenBy].n,fam:takenBy,owner:null};
  }
  return{tp:'libre',lb:'Libre - 5 fin de semana',fam:null};
}

function renderStats(){
  var cnt={1:0,2:0,3:0,4:0};
  getMonths().forEach(function(mo){
    getWEs(mo.y,mo.m).forEach(function(we){var s=wState(we);if(s.tp==='reservado')cnt[s.fam]++;});
  });
  document.getElementById('sb').innerHTML=[1,2,3,4].map(function(f){
    return '<div class="si" data-fam="'+f+'"><div class="sn">'+cnt[f]+'</div><div class="sl">'+FAM[f].n+'<br>fines de semana</div></div>';
  }).join('');
}

function buildMonthCard(y, m){
  var wes=getWEs(y,m), nd=dim(y,m), off=(fdm(y,m)+6)%7;
  var byd={};
  wes.forEach(function(we){byd[we.sd]=we;if(we.su)byd[we.su]=we;});

  var hdr=['Lu','Ma','Mi','Ju','Vi','Sa','Do'].map(function(l,idx){
    return '<div class="cdl '+(idx>=5?'wk':'')+'">'+l+'</div>';
  }).join('');

  var cells='';
  for(var ei=0;ei<off;ei++)cells+='<div class="cc"></div>';
  for(var d=1;d<=nd;d++){
    var dow=new Date(y,m,d).getDay();
    var isWE=(dow===0||dow===6);
    if(!isWE){cells+='<div class="cc wd">'+d+'</div>';continue;}
    var we=byd[d];
    if(!we){cells+='<div class="cc wd">'+d+'</div>';continue;}
    var st=wState(we);
    var isSat=(dow===6);
    var rc=isSat?(we.su?'r-start':'r-solo'):'r-end';
    var fa=st.fam?'data-fam="'+st.fam+'"':'';
    var can=(st.tp==='reservado'||st.tp==='liberado')&&st.fam===cur;
    var cl=can?'onclick="handleClick(\''+wKey(we)+'\')"':'';
    cells+='<div class="cc we s-'+st.tp+' '+rc+'" '+fa+' '+cl+'>'+d+'</div>';
  }

  var rows='';
  wes.forEach(function(we){
    var st=wState(we),f=st.fam;
    var rc2=st.tp==='compartido'?'comp':(st.tp==='libre'||st.tp==='liberado')?'libre':'';
    var fa2=f?'data-fam="'+f+'"':'';
    var tc=st.tp==='compartido'?'t-comp':st.tp==='libre'?'t-libre':st.tp==='liberado'?'t-lib':f?FAM[f].t:'t-f1';
    var tl=st.tp==='reservado'?'Reservado':st.tp==='liberado'?'Liberado':st.tp==='libre'?'Libre':st.tp==='tomado'?'Tomado':'Compartido';
    var btn='';
    if(st.tp==='reservado'&&f===cur)btn='<button class="ba b-lib" onclick="handleClick(\''+wKey(we)+'\')">Liberar</button>';
    else if(st.tp==='liberado'&&f===cur)btn='<button class="ba b-rec" onclick="handleClick(\''+wKey(we)+'\')">Recuperar</button>';
    else if(st.tp==='liberado'&&f!==cur)btn='<button class="ba b-tom" onclick="handleClick(\''+wKey(we)+'\')">Tomar</button>';
    else if(st.tp==='libre')btn='<button class="ba b-tom" onclick="handleClick(\''+wKey(we)+'\')">Reservar</button>';
    else if(st.tp==='tomado'&&st.owner===cur)btn='<button class="ba b-rec" onclick="handleClick(\''+wKey(we)+'\')">Recuperar</button>';
    else if(st.tp==='tomado'&&f===cur)btn='<button class="ba b-lib" onclick="handleClick(\''+wKey(we)+'\')">Liberar</button>';

    if(st.tp==='compartido'){
      var shKey='sh_'+wKey(we);
      var goingData=OV[shKey]||{};
      var goingDots=[1,2,3,4].map(function(fid){
        var going=goingData['f'+fid];
        return '<span class="fdot '+(going?'on':'off')+'" style="background:'+(going?['','#c0392b','#1a6b8a','#7d6608','#1e8449'][fid]:'#ccc')+'" title="'+FAM[fid].n+(going?' - Va':' - No confirmado')+'"></span>';
      }).join('');
      var iGoing=goingData['f'+cur];
      btn='<button class="ba '+(iGoing?'b-nov':'b-voy')+'" onclick="handleShared(\''+shKey+'\','+(iGoing?'false':'true')+')">'+( iGoing?'No voy':'Voy')+'</button>';
      rows+='<div class="wr comp"><div class="wi"><div class="wd2">Sab '+fmt(we.sat)+(we.sun?' - Dom '+fmt(we.sun):'')+'</div><div class="wf">'+st.lb+'<span class="going-dots">'+goingDots+'</span></div></div>'+btn+'</div>';
      return;
    }

    rows+='<div class="wr '+rc2+'" '+fa2+'><div class="wi"><div class="wd2">Sab '+fmt(we.sat)+(we.sun?' - Dom '+fmt(we.sun):'')+'</div><div class="wf">'+st.lb+'</div></div><span class="wtag '+tc+'">'+tl+'</span>'+btn+'</div>';
  });

  var hs=wes.some(function(we){return weShared(we);});
  var sn=hs?'<div class="snote">Periodo compartido - todas las familias pueden coincidir</div>':'';
  return '<div class="mh"><span class="mn">'+MN[m]+'</span><span class="my">'+y+'</span></div><div class="cg"><div class="cdh">'+hdr+'</div><div class="cc-grid">'+cells+'</div></div>'+sn+'<div class="wp">'+rows+'</div>';
}

function renderMonths(){
  var grid=document.getElementById('mg');
  grid.innerHTML='';
  var months=getMonths();
  for(var r=0;r<months.length;r+=4){
    var rowEl=document.createElement('div');
    rowEl.className='mrow';
    for(var c=r;c<Math.min(r+4,months.length);c++){
      var card=document.createElement('div');
      card.className='mc';
      card.innerHTML=buildMonthCard(months[c].y,months[c].m);
      rowEl.appendChild(card);
    }
    grid.appendChild(rowEl);
  }
}

function render(){
  renderStats();
  renderMonths();
  document.getElementById('vl').textContent=FAM[cur].n+' - podes liberar o recuperar tus fines de semana';
}

function handleShared(shKey, going) {
  setSyncStatus('loading');
  var url = DB + '/overrides/' + shKey + '/f' + cur + '.json';
  var method = going ? 'PUT' : 'DELETE';
  var body = going ? 'true' : null;
  fetch(url, {method:method, body:body})
    .then(function(){ fbFetch(); showToast(going ? 'Confirmado - Voy!' : 'Quitada tu confirmacion'); })
    .catch(function(){ setSyncStatus('err'); showToast('Error al guardar'); });
}

function handleClick(key){
  var pts=key.split('_');
  var ky=parseInt(pts[0]),km=parseInt(pts[1]),kd=parseInt(pts[2]);
  var wes=getWEs(ky,km),we=null;
  for(var i=0;i<wes.length;i++){if(wes[i].sd===kd){we=wes[i];break;}}
  if(!we)return;
  var st=wState(we);
  pend={key:key,we:we,st:st};

  if(st.tp==='reservado'&&st.fam===cur){
    document.getElementById('mt').textContent='Liberar este fin de semana';
    document.getElementById('mp').textContent='Quedara disponible para las otras familias. Podés recuperarlo si nadie lo toma.';
    document.getElementById('bca').textContent='Liberar';
    document.getElementById('bca').className='bco liberar';
  } else if(st.tp==='liberado'&&st.fam===cur){
    document.getElementById('mt').textContent='Recuperar este fin de semana';
    document.getElementById('mp').textContent='Volvera a estar reservado para tu familia.';
    document.getElementById('bca').textContent='Recuperar';
    document.getElementById('bca').className='bco recuperar';
  } else if(st.tp==='liberado'&&st.fam!==cur){
    document.getElementById('mt').textContent='Tomar este fin de semana';
    document.getElementById('mp').textContent='Lo reservas para tu familia. Se pintara con tu color.';
    document.getElementById('bca').textContent='Tomar';
    document.getElementById('bca').className='bco recuperar';
  } else if(st.tp==='libre'){
    document.getElementById('mt').textContent='Reservar este fin de semana';
    document.getElementById('mp').textContent='Es el 5° fin de semana del mes, libre para quien lo necesite. Lo reservas para tu familia.';
    document.getElementById('bca').textContent='Reservar';
    document.getElementById('bca').className='bco recuperar';
  } else if(st.tp==='tomado'&&st.owner===cur){
    document.getElementById('mt').textContent='Recuperar este fin de semana';
    document.getElementById('mp').textContent='Lo volvés a marcar como liberado, disponible para otras familias.';
    document.getElementById('bca').textContent='Recuperar';
    document.getElementById('bca').className='bco liberar';
  } else if(st.tp==='tomado'&&st.fam===cur){
    document.getElementById('mt').textContent='Liberar este fin de semana';
    document.getElementById('mp').textContent='Lo marcas como disponible nuevamente.';
    document.getElementById('bca').textContent='Liberar';
    document.getElementById('bca').className='bco liberar';
  } else { return; }

  document.getElementById('md').textContent='Sab '+fmt(we.sat)+(we.sun?' - Dom '+fmt(we.sun):'');
  document.getElementById('mo').classList.add('active');
}

function closeM(){document.getElementById('mo').classList.remove('active');pend=null;}

function confirmA(){
  if(!pend)return;
  var key=pend.key,st=pend.st;
  closeM();setSyncStatus('loading');
  var promise;
  if(st.tp==='reservado'){
    promise=fbSet(key,'liberado');
  } else if(st.tp==='liberado'&&st.fam===cur){
    promise=fbDel(key);
  } else if(st.tp==='liberado'&&st.fam!==cur){
    promise=fbSet(key,'tomado_'+cur);
  } else if(st.tp==='libre'){
    promise=fbSet(key,'tomado_'+cur);
  } else if(st.tp==='tomado'&&st.owner===cur){
    promise=fbSet(key,'liberado');
  } else if(st.tp==='tomado'&&(st.fam===cur||st.owner===null&&st.fam===cur)){
    promise=fbDel(key);
  } else { return; }
  promise.then(function(){
    fbFetch();
    showToast(st.tp==='libre'?'Fin de semana reservado!':st.tp==='liberado'&&st.fam!==cur?'Fin de semana tomado!':'Listo');
  }).catch(function(){setSyncStatus('err');showToast('Error al guardar');});
  pend=null;
}

function showToast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('v');
  setTimeout(function(){t.classList.remove('v');},3000);
}

document.querySelectorAll('.fbt').forEach(function(b){
  b.addEventListener('click',function(){
    document.querySelectorAll('.fbt').forEach(function(x){x.classList.remove('active');});
    b.classList.add('active');cur=parseInt(b.dataset.fam);render();
  });
  b.addEventListener('mouseenter',function(){
    document.body.classList.add('highlight-f'+b.dataset.fam);
  });
  b.addEventListener('mouseleave',function(){
    document.body.classList.remove('highlight-f'+b.dataset.fam);
  });
});
document.getElementById('mo').addEventListener('click',function(e){if(e.target===document.getElementById('mo'))closeM();});

// Start: render immediately, then fetch Firebase data
render();
startPolling();
</script>
</body>
</html>
